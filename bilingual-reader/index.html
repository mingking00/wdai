<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI双语阅读器 | Bilingual Reader</title>
    <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.88/dist/epub.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- 顶部工具栏 -->
        <header class="toolbar">
            <div class="toolbar-left">
                <button id="btn-upload" class="btn-primary">📚 打开书籍</button>
                <input type="file" id="file-input" accept=".epub,.txt" hidden>
                <span id="book-title" class="book-title">未加载书籍</span>
            </div>
            <div class="toolbar-center">
                <button id="btn-toc" class="btn-icon" title="目录">📑</button>
                <button id="btn-prev" class="btn-icon" title="上一章">◀</button>
                <select id="chapter-select">
                    <option>请先加载书籍</option>
                </select>
                <button id="btn-next" class="btn-icon" title="下一章">▶</button>
            </div>
            <div class="toolbar-right">
                <button id="btn-mode" class="btn-icon" title="切换双语/单语">🌐</button>
                <button id="btn-translate" class="btn-icon" title="AI翻译当前章节">🤖</button>
                <button id="btn-glossary" class="btn-icon" title="术语表">📖</button>
                <button id="btn-settings" class="btn-icon" title="设置">⚙️</button>
            </div>
        </header>

        <!-- 主阅读区 -->
        <main class="reader-container">
            <!-- 目录侧边栏 -->
            <aside id="toc-panel" class="toc-panel hidden">
                <h3>📑 目录</h3>
                <div id="toc-list"></div>
            </aside>

            <!-- 阅读区域 -->
            <div class="reading-area" id="reading-area">
                <!-- 中文面板 -->
                <div class="panel chinese-panel" id="chinese-panel">
                    <div class="panel-header">
                        <span class="lang-label">中文</span>
                    </div>
                    <div class="panel-content" id="viewer"></div>
                </div>

                <!-- 英文面板 -->
                <div class="panel english-panel hidden" id="english-panel">
                    <div class="panel-header">
                        <span class="lang-label">English (AI Translation)</span>
                        <button id="btn-retranslate" class="btn-small" title="重新翻译">🔄</button>
                    </div>
                    <div class="panel-content" id="english-content">
                        <div class="placeholder">
                            <p>🤖 点击右上角翻译按钮生成英文版本</p>
                            <p>Click translate button to generate English version</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- 术语弹窗 -->
        <div id="term-popup" class="term-popup hidden">
            <div class="popup-header">
                <span id="term-name" class="term-name"></span>
                <button class="btn-close" onclick="closePopup()">×</button>
            </div>
            <div class="popup-content">
                <div class="term-type" id="term-type"></div>
                <div class="term-desc" id="term-desc"></div>
                <div class="term-en" id="term-en"></div>
            </div>
        </div>

        <!-- 术语表面板 -->
        <div id="glossary-panel" class="glossary-panel hidden">
            <div class="panel-header">
                <h3>📖 术语表 / Glossary</h3>
                <button class="btn-close" onclick="toggleGlossary()">×</button>
            </div>
            <div class="glossary-tabs">
                <button class="tab-btn active" data-tab="characters">人物</button>
                <button class="tab-btn" data-tab="concepts">概念</button>
                <button class="tab-btn" data-tab="places">地点</button>
            </div>
            <div class="glossary-content" id="glossary-content"></div>
        </div>

        <!-- 设置面板 -->
        <div id="settings-panel" class="settings-panel hidden">
            <div class="panel-header">
                <h3>⚙️ 设置</h3>
                <button class="btn-close" onclick="toggleSettings()">×</button>
            </div>
            <div class="settings-content">
                <div class="setting-item">
                    <label>字体大小</label>
                    <input type="range" id="font-size" min="12" max="24" value="16">
                    <span id="font-size-value">16px</span>
                </div>
                <div class="setting-item">
                    <label>行高</label>
                    <input type="range" id="line-height" min="1.2" max="2.0" step="0.1" value="1.6">
                    <span id="line-height-value">1.6</span>
                </div>
                <div class="setting-item">
                    <label>主题</label>
                    <select id="theme-select">
                        <option value="light">浅色</option>
                        <option value="dark">深色</option>
                        <option value="sepia"> sepia</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>翻译服务</label>
                    <select id="translation-service">
                        <option value="demo">Demo模式（假翻译）</option>
                        <option value="openai">OpenAI GPT</option>
                        <option value="claude">Claude</option>
                        <option value="google">Google Translate</option>
                        <option value="deepl">DeepL</option>
                    </select>
                </div>

                <div class="setting-item" id="api-key-container" style="display:none;">
                    <label>API Key</label>
                    <input type="password" id="api-key" placeholder="输入你的API Key">
                    <small style="color:var(--text-secondary);">Key只保存在本地浏览器中</small>
                </div>

                <div class="setting-item">
                    <label>翻译范围</label>
                    <select id="translation-scope">
                        <option value="current">仅当前章节</option>
                        <option value="10">前10章</option>
                        <option value="20">前20章</option>
                        <option value="all">全部章节</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 加载提示 -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p id="loading-text">加载中...</p>
        </div>
    </div>

    <script src="glossary.js"></script>
    <script src="translator.js"></script>
    <script src="reader.js"></script>
</body>
</html>
