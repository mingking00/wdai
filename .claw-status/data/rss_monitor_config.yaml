# RSS监控配置 - 跨平台信息源
# 生成时间: 2026-03-18
# 监控来源: YouTube + Newsletter + 技术博客

sources:
  # ========== YouTube ==========
  - name: "@Yonggie"
    platform: youtube
    rss_url: "https://www.youtube.com/feeds/videos.xml?channel_id=UCYjwzfvKIQpgJ7aRjE5B-QQ"
    check_interval: 3600  # 每小时检查
    grade: "A"
    trust_score: 0.5
    keywords: ["AI", "Claude", "LLM", "Agent", "OpenAI"]
    notify_threshold: 1.5
    notify_strategy: "immediate"

  # ========== Newsletter ==========
  - name: "TLDR AI"
    platform: newsletter
    rss_url: "https://tldrnewsletter.com/ai/rss"
    check_interval: 86400  # 每日
    grade: "A"
    trust_score: 0.5
    keywords: ["AI", "machine learning", "LLM"]
    notify_threshold: 1.0
    notify_strategy: "daily_digest"

  - name: "Import AI"
    platform: newsletter
    rss_url: "https://importai.substack.com/feed"
    check_interval: 604800  # 每周
    grade: "A-"
    trust_score: 0.5
    keywords: ["AI research", "policy", "technical"]
    notify_threshold: 0.8
    notify_strategy: "weekly_digest"

  # ========== 技术博客 ==========
  - name: "Anthropic Blog"
    platform: blog
    rss_url: "https://www.anthropic.com/research/rss.xml"
    check_interval: 3600  # 每小时检查
    grade: "S"
    trust_score: 0.8
    keywords: ["Claude", "safety", "alignment", "research"]
    notify_threshold: 0.0  # 所有文章都推送
    notify_strategy: "immediate"

  - name: "Lil'Log"
    platform: blog
    rss_url: "https://lilianweng.github.io/rss.xml"
    check_interval: 86400  # 每日
    grade: "A+"
    trust_score: 0.7
    keywords: ["LLM", "Agent", "RL", "AI systems"]
    notify_threshold: 0.0  # 所有文章都推送
    notify_strategy: "immediate"

  - name: "Simon Willison"
    platform: blog
    rss_url: "https://simonwillison.net/atom.xml"
    check_interval: 86400  # 每日
    grade: "A"
    trust_score: 0.5
    keywords: ["LLM", "tools", "Datasette", "AI engineering"]
    notify_threshold: 1.0
    notify_strategy: "selective"

