rules:
- id: python-hardcoded-password
  message: 可能的硬编码密码
  pattern: (?:password|passwd|pwd)\s*=\s*["\'][^"\']{8,}["\']
  severity: high
- id: python-hardcoded-secret
  message: 可能的硬编码密钥/令牌
  pattern: (?:secret|api_key|apikey|token|access_key|private_key)\s*=\s*["\'][^"\']{16,}["\']
  severity: high
- id: python-aws-key
  message: 检测到 AWS Access Key ID
  pattern: AKIA[0-9A-Z]{16}
  severity: critical
- id: python-openai-key
  message: 检测到 OpenAI API Key
  pattern: sk-[a-zA-Z0-9]{48}
  severity: critical
- id: python-print-secret
  message: 打印敏感信息，可能泄露到日志
  pattern: print\s*\([^)]*(?:password|secret|token|key)
  severity: medium
- id: python-django-secret-key
  message: Django SECRET_KEY 硬编码，应使用环境变量
  pattern: SECRET_KEY\s*=\s*["\'][^"\']+["\']
  severity: critical
